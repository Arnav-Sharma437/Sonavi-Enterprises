<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="100%" height="100%">
  <defs>
    <!-- Peacock S icon gradient (blue/teal/pink/orange) -->
    <linearGradient id="peacockGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2E4A9E" /> <!-- Deep blue -->
      <stop offset="40%" stop-color="#1B9AA0" /> <!-- Teal -->
      <stop offset="75%" stop-color="#E85A9C" /> <!-- Pink -->
      <stop offset="100%" stop-color="#F5A25D" /> <!-- Orange -->
    </linearGradient>
    
    <!-- Wordmark gradient (green top to orange bottom) -->
    <linearGradient id="wordmarkGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8DC63F" /> <!-- Green -->
      <stop offset="100%" stop-color="#F5A25D" /> <!-- Orange -->
    </linearGradient>
  </defs>

  <!-- Stylized Peacock "S" Shape Icon -->
  <g transform="translate(10, 8)">
    <!-- Head / Crest (Deep blue) -->
    <circle cx="28" cy="14" r="5" fill="#2E4A9E" />
    <path d="M 28 14 C 29 8, 32 8, 34 10" stroke="#1B9AA0" stroke-width="1.5" fill="none" stroke-linecap="round" />
    <circle cx="34" cy="10" r="1.5" fill="#E85A9C" />
    
    <!-- S Body -->
    <path d="M 28 20 
             C 12 20, 10 38, 24 45 
             C 38 52, 34 68, 18 68
             C 8 68, 6 60, 6 60
             C 6 60, 10 64, 18 62
             C 26 60, 26 48, 16 42
             C 4 35, 10 20, 28 20 Z" 
          fill="url(#peacockGrad1)" />
          
    <!-- Decorative feather accents inside S or next to it -->
    <path d="M 20 32 C 22 28, 28 28, 30 32 C 31 35, 27 38, 20 32 Z" fill="#1B9AA0" opacity="0.85" />
    <path d="M 16 52 C 14 56, 18 60, 22 56 C 24 53, 20 50, 16 52 Z" fill="#E85A9C" opacity="0.85" />
  </g>

  <!-- Wordmark "Sonavi" (S is the icon, "onavi" is the text) -->
  <g transform="translate(70, 0)">
    <text x="0" y="46" font-family="'Poppins', 'Montserrat', 'Inter', sans-serif" font-size="38" font-weight="700" letter-spacing="-0.5" fill="url(#wordmarkGrad)">onavi</text>
    
    <!-- Tagline "CRAFTING MASTERPIECES" in teal, uppercase, tracked out -->
    <text x="2" y="64" font-family="'Inter', sans-serif" font-size="7.5" font-weight="600" letter-spacing="4.5" fill="#1B9AA0">CRAFTING MASTERPIECES</text>
  </g>
</svg>
